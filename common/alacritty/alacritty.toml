[window]
opacity = 0.87
# opacity = 1
padding = { x = 5, y = 5 }
decorations = "None"

[colors.primary]
background = "0x222436"
foreground = "0xFFFFFF"

[colors.bright]
black = "#444b6a"
blue = "#7da6ff"
cyan = "#0db9d7"
green = "#b9f27c"
magenta = "#bb9af7"
red = "#ff7a93"
white = "#acb0d0"
yellow = "#ff9e64"

[colors.normal]
black = "#32344a"
blue = "#7aa2f7"
cyan = "#449dab"
green = "#9ece6a"
magenta = "#ad8ee6"
red = "#f7768e"
white = "#787c99"
yellow = "#e0af68"

[font]
size = 17.0

[font.bold]
family = "DejaVu Sans Mono"
# family = "DejaVuSansM Nerd Font Propo"
style = "Bold"

[font.italic]
family = "DejaVu Sans Mono"
# family = "DejaVuSansM Nerd Font Propo"
style = "Italic"

[font.normal]
family = "DejaVu Sans Mono"
# family = "DejaVuSansM Nerd Font Propo"
style = "Regular"

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"
